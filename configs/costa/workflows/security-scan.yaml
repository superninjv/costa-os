name: security-scan
description: Check failed logins, orphaned packages, outdated packages
trigger:
  type: schedule
  calendar: "*-*-* 03:00:00"
steps:
  - id: failed-ssh
    action: shell
    command: "journalctl -u sshd --since '24 hours ago' --no-pager 2>/dev/null | grep -i 'failed\\|invalid' | tail -10 || echo 'No SSH failures'"
  - id: orphans
    action: shell
    command: "pacman -Qdtq 2>/dev/null | head -20 || echo 'No orphans'"
  - id: outdated
    action: shell
    command: "checkupdates 2>/dev/null | wc -l || echo '0'"
  - id: analyze
    action: costa-ai
    query: "Security scan results. Prioritize by urgency and recommend actions:\nFailed SSH: {{steps.failed-ssh.output}}\nOrphan packages: {{steps.orphans.output}}\nOutdated packages: {{steps.outdated.output}}"
    model: local
  - id: notify
    action: notify
    title: "Security Scan"
    body: "{{steps.analyze.output}}"
