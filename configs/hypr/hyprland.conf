################
### MONITORS ###
################

# Auto-detect monitors — Costa first-boot generates specific config
# Fallback: use whatever is connected at preferred resolution
monitor = , preferred, auto, 1


###################
### MY PROGRAMS ###
###################

$terminal = ghostty
$fileManager = thunar
$menu = rofi -show drun
$browser = firefox


#################
### AUTOSTART ###
#################

exec-once = ~/.config/costa/scripts/wallpaper.sh
exec-once = waybar
exec-once = bash -c 'command -v ags &>/dev/null && ags run -d ~/.config/ags'
exec-once = bash -c 'command -v nwg-dock-hyprland &>/dev/null && nwg-dock-hyprland -d -i 48 -mb 6 -ml 0 -mr 0 -x'
exec-once = bash -c 'command -v swayosd-server &>/dev/null && swayosd-server'
exec-once = dunst
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = nm-applet --indicator
exec-once = bash -c '~/.config/costa/scripts/ollama-manager.sh &disown'
exec-once = bash -c '[ -f ~/.config/costa/vad/vad_daemon.py ] && python3 ~/.config/costa/vad/vad_daemon.py &disown'

# Claude's virtual monitor — headless display for AI navigation (only if enabled in wizard)
# first-boot.sh adds this when user enables AI navigation
# exec-once = hyprctl output create headless


#####################
### LOOK AND FEEL ###
#####################

# ── Costa — Mediterranean Coastal Palette ──
$base       = 0xff1b1d2b
$mantle     = 0xff161821
$crust      = 0xff121318
$surface0   = 0xff252836
$surface1   = 0xff2f3345
$surface2   = 0xff3a3e52
$overlay0   = 0xff545870
$overlay1   = 0xff6b7089
$overlay2   = 0xff8287a1
$subtext0   = 0xff9a9eb5
$subtext1   = 0xffb3b6c9
$text       = 0xffd4cfc4

$terracotta = 0xffc07a56
$olive      = 0xff8b9968
$sea        = 0xff5b94a8
$deep_sea   = 0xff4a7d8f
$sand       = 0xffc9a96e
$lavender   = 0xff9884b8
$sunset     = 0xffd08860
$foam       = 0xff7eb5b0
$sage       = 0xff8ba07a
$rose       = 0xffb87272
$limestone  = 0xffe6ddd0

general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2

    col.active_border = $sea $foam $lavender $sea 45deg
    col.inactive_border = $surface1 $surface2 45deg

    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 12

    active_opacity = 1.0
    inactive_opacity = 0.90
    fullscreen_opacity = 1.0

    shadow {
        enabled = true
        range = 25
        render_power = 3
        color = rgba(12, 14, 20, 0.55)
        color_inactive = rgba(12, 14, 20, 0.25)
    }

    blur {
        enabled = true
        size = 10
        passes = 3
        new_optimizations = true
        xray = false
        ignore_opacity = false
        noise = 0.015
        contrast = 0.9
        brightness = 0.75
        vibrancy = 0.1
    }
}

animations {
    enabled = true

    bezier = wind,     0.05, 0.9, 0.1,  1.05
    bezier = windIn,   0.1,  1.1, 0.1,  1.0
    bezier = windOut,  0.3, -0.3, 0,    1
    bezier = slow,     0,    0.85,0.3,  1
    bezier = softOut,  0.36, 0,   0.66, -0.56

    animation = windows,       1, 6, wind,    slide
    animation = windowsIn,     1, 5, windIn,  slide
    animation = windowsOut,    1, 3, windOut, slide
    animation = windowsMove,   1, 5, wind,    slide
    animation = border,        1, 10, default
    animation = borderangle,   1, 120, default, loop
    animation = fade,          1, 5,  slow
    animation = workspaces,    1, 5,  wind,    slide
    animation = layers,        1, 4,  wind,    fade
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    focus_on_activate = true
}

cursor {
    no_hardware_cursors = true
}


#######################
### ENVIRONMENT VARS ##
#######################

env = XCURSOR_THEME,Bibata-Modern-Ice
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1

# Accessibility — lets Claude read app content without screenshots
env = GTK_A11Y,atspi
env = MOZ_ENABLE_A11Y,1


#############
### INPUT ###
#############

input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = true
        tap-to-click = true
        disable_while_typing = true
    }
}



####################
### KEYBINDINGS  ###
####################

$mainMod = SUPER

# Core
bind = $mainMod,       Return,    exec, $terminal
bind = $mainMod,       B,         exec, $browser
bind = $mainMod,       E,         exec, $fileManager
bind = $mainMod,       Space,     exec, $menu
bind = $mainMod,       Q,         killactive
bind = $mainMod SHIFT, E,         exit
bind = $mainMod,       F,         fullscreen, 0
bind = $mainMod SHIFT, F,         togglefloating
bind = $mainMod,       P,         pseudo
bind = $mainMod,       T,         togglesplit

# Media controls (works with any MPRIS player)
bind = $mainMod,       bracketright, exec, playerctl next
bind = $mainMod,       bracketleft,  exec, playerctl previous
bind = $mainMod,       backslash,    exec, playerctl play-pause

# Focus movement (vim-style)
bind = $mainMod, H, movefocus, l
bind = $mainMod, J, movefocus, d
bind = $mainMod, K, movefocus, u
# Note: SUPER+L is lock — use SUPER+; for right focus
bind = $mainMod, semicolon, movefocus, r

# Move windows
bind = $mainMod SHIFT, H,         movewindow, l
bind = $mainMod SHIFT, semicolon, movewindow, r
bind = $mainMod SHIFT, K,         movewindow, u
bind = $mainMod SHIFT, J,         movewindow, d

# Resize windows
binde = $mainMod CTRL, H,         resizeactive, -40 0
binde = $mainMod CTRL, semicolon, resizeactive, 40 0
binde = $mainMod CTRL, K,         resizeactive, 0 -40
binde = $mainMod CTRL, J,         resizeactive, 0 40

# Workspaces 1-9
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

# Move window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9

# Scroll through workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# Move/resize with mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Screenshots
bind = ,         Print, exec, grim -g "$(slurp)" ~/Pictures/Screenshots/$(date +%Y-%m-%d_%H-%M-%S).png
bind = SHIFT,    Print, exec, grim ~/Pictures/Screenshots/$(date +%Y-%m-%d_%H-%M-%S).png
bind = $mainMod, Print, exec, grim -g "$(slurp)" - | wl-copy

# Clipboard
bind = $mainMod, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy

# Push-to-talk: SUPER+ALT+V = Claude mode, SUPER+ALT+B = type mode
bind = $mainMod ALT, V, exec, bash -c 'PTT_MODE=claude ~/.config/costa/voice/push-to-talk.sh'
bind = $mainMod ALT, B, exec, bash -c 'PTT_MODE=type ~/.config/costa/voice/push-to-talk.sh'

# Costa AI tools
bind = $mainMod ALT, P, exec, costa-ai-project-select
bind = $mainMod ALT, F, exec, costa-ai-file-search
bind = $mainMod SHIFT, S, exec, costa-ai-screenshot


# Volume
binde = , XF86AudioRaiseVolume,  exec, swayosd-client --output-volume raise || wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
binde = , XF86AudioLowerVolume,  exec, swayosd-client --output-volume lower || wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind  = , XF86AudioMute,         exec, swayosd-client --output-volume mute-toggle || wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind  = , XF86AudioMicMute,      exec, swayosd-client --input-volume mute-toggle || wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bind  = , XF86AudioPlay,         exec, playerctl play-pause
bind  = , XF86AudioNext,         exec, playerctl next
bind  = , XF86AudioPrev,         exec, playerctl previous

# Brightness
binde = , XF86MonBrightnessUp,   exec, brightnessctl set +5%
binde = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Lid close → suspend (laptops)
bindl = , switch:Lid Switch, exec, systemctl suspend

# Monitor focus
bind = $mainMod, comma,  focusmonitor, -1
bind = $mainMod, period, focusmonitor, +1
bind = $mainMod SHIFT, comma,  movewindow, mon:-1
bind = $mainMod SHIFT, period, movewindow, mon:+1


##################
### WINDOWRULES ###
##################

windowrule = match:class ^(pavucontrol)$, float on, center on, size 800 600
windowrule = match:class ^(nm-connection-editor)$, float on, center on
windowrule = match:class ^(thunar)$ match:title ^(File Operation Progress), float on
windowrule = match:title ^(Picture-in-Picture)$, float on
windowrule = match:class ^(hyprpicker)$, float on
windowrule = match:class ^(voice-output)$, float on, size 900 500, center on, opacity 0.95 0.90
windowrule = match:class ^(costa-music)$, float on, size 420 680, move 200 44, opacity 0.97 0.92, pin on
windowrule = match:class ^(com\.costa\.keybinds)$, float on, size 850 650, center on
windowrule = match:class ^(com\.costa\.settings)$, float on, size 700 750, center on
windowrule = match:title ^(headless-preview)$, float on, pin on, move 100%-496 50, opacity 0.95 0.85

# On-screen keyboard (squeekboard) — touchscreen only
windowrule = match:class ^(sm\.puri\.Squeekboard)$, float on, pin on, move 0 100%, animation slide

windowrule = match:class ^(thunar)$, opacity 0.95 0.85
windowrule = match:class ^(firefox)$, opacity 1.0 1.0
windowrule = match:class ^(code-oss)$, opacity 1.0 1.0
windowrule = match:class ^(code)$, opacity 1.0 1.0


######################
### LAYER RULES    ###
######################

# AGS shell blur
layerrule = blur on, match:namespace costa-bar
layerrule = ignore_alpha 0.3, match:namespace costa-bar
layerrule = blur on, match:namespace costa-notch
layerrule = ignore_alpha 0.3, match:namespace costa-notch
layerrule = blur on, match:namespace costa-minimal
layerrule = ignore_alpha 0.3, match:namespace costa-minimal
layerrule = blur on, match:namespace costa-portrait
layerrule = ignore_alpha 0.3, match:namespace costa-portrait

# nwg-dock
layerrule = blur on, match:namespace nwg-dock-hyprland
layerrule = ignore_alpha 0.3, match:namespace nwg-dock-hyprland
